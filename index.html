<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我在末世捡垃圾 - 预览版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'ZCOOL KuaiLe', cursive; background: #1a1a1a; color: white; overflow: hidden; }
        .fade-in { animation: fadeIn 0.8s ease-in forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .bg-cover-custom {
            background-image: url('cover.jpg'); 
            background-size: cover; background-position: center;
        }
        .char-card { transition: all 0.2s; cursor: pointer; border: 4px solid transparent; }
        .char-card:hover { transform: scale(1.05); }
        .selected-card { border-color: #fbbf24; background-color: rgba(251, 191, 36, 0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [step, setStep] = useState('cover'); 
            const [charInfo, setCharInfo] = useState({ name: '', gender: '待确定', styleId: null });

            // 界面 1: 封面 (保持不变)
            if (step === 'cover') {
                return (
                    <div className="h-screen w-screen bg-cover-custom flex flex-col items-center justify-end pb-24 cursor-pointer" onClick={() => setStep('menu')}>
                        <p className="text-2xl animate-bounce text-white/90 bg-black/30 px-6 py-2 rounded-full backdrop-blur-sm">点击屏幕开始</p>
                    </div>
                );
            }

            // 界面 2: 菜单 (保持不变)
            if (step === 'menu') {
                return (
                    <div className="h-screen w-screen bg-black/60 flex flex-col items-center justify-center space-y-6 fade-in">
                        <h1 className="text-5xl font-bold mb-10 text-yellow-500">我在末世捡垃圾</h1>
                        <button onClick={() => setStep('create')} className="w-64 py-4 bg-yellow-600 hover:bg-yellow-500 rounded-full text-2xl transition shadow-lg">开始新游戏</button>
                        <button className="w-64 py-4 bg-white/10 hover:bg-white/20 rounded-full text-2xl border border-white/30 transition">找找我的旧存档</button>
                        <button className="w-64 py-4 bg-white/10 hover:bg-white/20 rounded-full text-2xl border border-white/30 transition">设置</button>
                    </div>
                );
            }

            // 界面 3: 基础档案 + 形象选择 (删除捏人按钮，改为直接选图)
            if (step === 'create') {
                return (
                    <div className="h-screen w-screen flex items-center justify-center p-4 fade-in">
                        <div className="bg-orange-50 p-8 rounded-lg shadow-2xl text-gray-800 max-w-4xl w-full border-t-8 border-yellow-600">
                            <h2 className="text-3xl font-bold mb-6 text-center border-b-2 border-gray-300 pb-2">幸存者登记表</h2>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                {/* 信息输入列 */}
                                <div className="space-y-6">
                                    <div>
                                        <label className="block text-xl mb-2">姓名:</label>
                                        <input type="text" className="w-full border-2 border-gray-400 p-2 rounded" placeholder="输入你的名字..." 
                                               onChange={(e) => setCharInfo({...charInfo, name: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-xl mb-2">性别:</label>
                                        <div className="flex space-x-2">
                                            {['男', '女', '待确定'].map(g => (
                                                <button key={g} onClick={() => setCharInfo({...charInfo, gender: g, styleId: null})}
                                                        className={`flex-1 py-2 rounded border-2 transition ${charInfo.gender === g ? 'bg-yellow-600 border-yellow-700 text-white' : 'bg-white border-gray-300'}`}>
                                                    {g}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                {/* 形象选择列 (仅当选择女时出现图片) */}
                                <div>
                                    {charInfo.gender === '女' ? (
                                        <div className="space-y-4">
                                            <label className="block text-xl mb-2">点击图片选择形象:</label>
                                            <div className="grid grid-cols-3 gap-2">
                                                {[1, 2, 3].map(id => (
                                                    <div key={id} onClick={() => setCharInfo({...charInfo, styleId: id})}
                                                         className={`char-card p-1 rounded-lg ${charInfo.styleId === id ? 'selected-card' : ''}`}>
                                                        <img src={`assets/female_style_${id}.png`} alt="形象" className="w-full h-auto object-contain" />
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="h-full flex items-center justify-center border-2 border-dashed border-gray-300 rounded text-gray-400 p-4 text-center">
                                            {charInfo.gender === '男' ? "暂无男性形象" : "请先选择性别"}
                                        </div>
                                    )}
                                </div>
                            </div>

                            <button onClick={() => alert('进入游戏场景逻辑开发中...')} 
                                    disabled={!charInfo.name || charInfo.gender !== '女' || !charInfo.styleId}
                                    className={`w-full mt-8 py-4 rounded text-2xl font-bold transition ${(!charInfo.name || charInfo.gender !== '女' || !charInfo.styleId) ? 'bg-gray-300 text-gray-500 cursor-not-allowed' : 'bg-green-600 hover:bg-green-500 text-white shadow-lg'}`}>
                                就这样，出发捡垃圾！
                            </button>
                        </div>
                    </div>
                );
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
